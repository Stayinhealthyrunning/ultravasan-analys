name: Importera historiska Ultravasan 45-resultat

on:
  workflow_dispatch:
    inputs:
      source_permission_confirmed:
        description: "Bekräfta att Vasaloppets publika resultatsidor får hämtas"
        required: true
        default: false
        type: boolean
      full_import_confirmed:
        description: "Bekräfta full historikimport efter granskade probar"
        required: true
        default: false
        type: boolean
      force_refresh:
        description: "Hämta om redan cachade resultatsidor"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ultravasan45-history
  cancel-in-progress: false

env:
  HISTORY_RACES: |
    2014|ultravasan45-2014|UL45_000017167888590000000399
    2015|ultravasan45-2015|UL45_9999991678885A000000043D
    2016|ultravasan45-2016|UL45_9999991678885A00000004CB
    2017|ultravasan45-2017|UL45_9999991678885A0000000620
    2018|ultravasan45-2018|UL45_9999991678885B00000006D3
    2019|ultravasan45-2019|UL45_9999991678885C0000000709
    2022|ultravasan45-2022|UL45_HCH8NDMR2201
    2023|ultravasan45-2023|UL45_HCH8NDMR2301
    2024|ultravasan45-2024|UL45_HCH8NDMR2401

jobs:
  importera:
    if: inputs.source_permission_confirmed == true
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Hämta projektet
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installera Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installera importpaket och Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-browser.txt
          python -m playwright install --with-deps chromium

      - name: Validera år, eventkoder och kontrolluppsättningar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/uv45-history-validation
          python tools/validate_uv45_history.py --config-only \
            | tee reports/uv45-history-validation/configuration.json
          echo "Konfigurationen innehåller exakt de nio godkända historikåren."

      - name: Säkerhetskopiera databasen och UV90-läget
        shell: bash
        run: |
          set -euo pipefail
          before="$RUNNER_TEMP/uv45-history-artifact/before-import"
          mkdir -p "$before/data"
          cp data/ultravasan.sqlite "$before/data/ultravasan.sqlite"
          python tools/validate_uv45_history.py \
            --write-uv90-snapshot "$before/uv90-snapshot.json"

      - name: Probe och kvalitetsgrind för varje år
        shell: bash
        run: |
          set -euo pipefail
          force_args=()
          if [[ "${{ inputs.force_refresh }}" == "true" ]]; then
            force_args+=(--force)
          fi

          while IFS='|' read -r year race event; do
            [[ -z "$year" ]] && continue
            db="$RUNNER_TEMP/uv45-probe-$year.sqlite"
            raw="$RUNNER_TEMP/uv45-probe-raw-$year"
            snapshot="$RUNNER_TEMP/uv90-probe-$year.json"
            rm -f "$db"

            echo "::group::Probe UV45 $year ($event)"
            python tools/uvtool.py --db "$db" init
            python tools/validate_uv45_history.py \
              --db "$db" \
              --write-uv90-snapshot "$snapshot"

            if ! python tools/mika_import.py probe \
              --race "$race" \
              --db "$db" \
              --raw "$raw" \
              --limit 3 \
              --max-pages 1 \
              --browser-fallback \
              "${force_args[@]}"; then
              echo "::error title=Probe misslyckades för UV45 $year::$event kunde inte provimporteras."
              exit 1
            fi

            if ! python tools/validate_mika_probe.py --race "$race" --db "$db" \
              | tee "reports/uv45-history-validation/probe-parser-$year.txt"; then
              echo "::error title=Parservalidering misslyckades för UV45 $year::$event har blockerande parserproblem."
              exit 1
            fi

            if ! python tools/validate_uv45_history.py \
              --db "$db" \
              --race "$race" \
              --event-code "$event" \
              --compare-uv90-snapshot "$snapshot" \
              | tee "reports/uv45-history-validation/probe-history-$year.json"; then
              echo "::error title=Historikgrind misslyckades för UV45 $year::$event klarade inte kontroll- eller UV90-separeringen."
              exit 1
            fi
            echo "::endgroup::"
          done <<< "$HISTORY_RACES"

      - name: Stoppa säkert efter godkända probar
        if: inputs.full_import_confirmed != true
        run: |
          echo "Alla nio probar är godkända."
          echo "Full import är inte bekräftad och den riktiga databasen har därför inte ändrats."
          echo "Granska artefakterna och starta om med full_import_confirmed=true för att importera."

      - name: Importera de nio historikåren
        if: ${{ success() && inputs.full_import_confirmed == true }}
        shell: bash
        run: |
          set -euo pipefail
          force_args=()
          if [[ "${{ inputs.force_refresh }}" == "true" ]]; then
            force_args+=(--force)
          fi

          python tools/uvtool.py init
          while IFS='|' read -r year race event; do
            [[ -z "$year" ]] && continue
            echo "::group::Full import UV45 $year ($event)"
            if ! python tools/mika_import.py scrape \
              --race "$race" \
              --raw "raw/mika/$race" \
              --browser-fallback \
              "${force_args[@]}"; then
              echo "::error title=Import misslyckades för UV45 $year::$event kunde inte fullimporteras. Databasbackupen finns som artefakt."
              exit 1
            fi

            if ! python tools/validate_uv45_history.py \
              --race "$race" \
              --event-code "$event" \
              | tee "reports/uv45-history-validation/import-$year.json"; then
              echo "::error title=Kvalitetsgrind misslyckades för UV45 $year::$event importeras inte vidare till publicering."
              exit 1
            fi
            echo "::endgroup::"
          done <<< "$HISTORY_RACES"

      - name: Validera hela databasen och bygg webbdata
        if: ${{ success() && inputs.full_import_confirmed == true }}
        shell: bash
        run: |
          set -euo pipefail
          python tools/validate_uv45_history.py \
            --compare-uv90-snapshot "$RUNNER_TEMP/uv45-history-artifact/before-import/uv90-snapshot.json" \
            | tee reports/uv45-history-validation/final-uv90.json
          python tools/uvtool.py validate \
            | tee reports/uv45-history-validation/final-database.txt
          python tools/uvtool.py export \
            | tee reports/uv45-history-validation/final-web-export.txt
          echo "Alla nio UV45-år är validerade och UV90 är semantiskt oförändrat."

      - name: Förbered verifierat före- och efter-import-artifact
        if: ${{ success() && inputs.full_import_confirmed == true }}
        shell: bash
        run: |
          set -euo pipefail
          after="$RUNNER_TEMP/uv45-history-artifact/after-import"
          mkdir -p \
            "$after/data" \
            "$after/docs/data" \
            "$after/reports/uv45-history-validation"

          cp data/ultravasan.sqlite "$after/data/ultravasan.sqlite"
          cp docs/data/ultravasan.json "$after/docs/data/ultravasan.json"
          cp docs/data/ultravasan-data.js "$after/docs/data/ultravasan-data.js"
          cp docs/data/manifest.json "$after/docs/data/manifest.json"
          cp reports/ultravasan45-*-import.json "$after/reports/"
          cp reports/ultravasan45-*-probe.json "$after/reports/"
          cp -R reports/uv45-history-validation/. "$after/reports/uv45-history-validation/"

          test -s "$after/data/ultravasan.sqlite"
          test -s "$after/docs/data/ultravasan.json"
          test -s "$after/docs/data/ultravasan-data.js"
          test -s "$after/docs/data/manifest.json"
          while IFS='|' read -r year race event; do
            [[ -z "$year" ]] && continue
            test -s "$after/reports/ultravasan45-$year-import.json"
            test -s "$after/reports/uv45-history-validation/import-$year.json"
          done <<< "$HISTORY_RACES"

      - name: Ladda upp validerad databas före publicering
        if: ${{ success() && inputs.full_import_confirmed == true }}
        uses: actions/upload-artifact@v4
        with:
          name: uv45-history-validated-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: ${{ runner.temp }}/uv45-history-artifact

      - name: Publicera den validerade historikimporten
        if: ${{ success() && inputs.full_import_confirmed == true }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          payload="$RUNNER_TEMP/uv45-history-artifact/after-import"
          publish_worktree="$RUNNER_TEMP/uv45-history-publish"

          for attempt in 1 2 3; do
            echo "Publiceringsförsök $attempt av 3: hämtar senaste origin/main."
            git fetch origin main:refs/remotes/origin/main
            git worktree remove --force "$publish_worktree" 2>/dev/null || true
            rm -rf "$publish_worktree"
            git worktree add --detach "$publish_worktree" origin/main

            mkdir -p \
              "$publish_worktree/data" \
              "$publish_worktree/docs/data" \
              "$publish_worktree/reports/uv45-history-validation"
            cp "$payload/data/ultravasan.sqlite" "$publish_worktree/data/ultravasan.sqlite"
            cp "$payload/docs/data/ultravasan.json" "$publish_worktree/docs/data/ultravasan.json"
            cp "$payload/docs/data/ultravasan-data.js" "$publish_worktree/docs/data/ultravasan-data.js"
            cp "$payload/docs/data/manifest.json" "$publish_worktree/docs/data/manifest.json"
            cp "$payload"/reports/ultravasan45-*-import.json "$publish_worktree/reports/"
            cp "$payload"/reports/ultravasan45-*-probe.json "$publish_worktree/reports/"
            cp -R "$payload/reports/uv45-history-validation/." \
              "$publish_worktree/reports/uv45-history-validation/"

            git -C "$publish_worktree" add -f \
              data/ultravasan.sqlite \
              docs/data/ultravasan.json \
              docs/data/ultravasan-data.js \
              docs/data/manifest.json \
              reports/ultravasan45-*-import.json \
              reports/ultravasan45-*-probe.json \
              reports/uv45-history-validation

            while IFS= read -r changed; do
              case "$changed" in
                data/ultravasan.sqlite|docs/data/ultravasan.json|docs/data/ultravasan-data.js|docs/data/manifest.json|reports/ultravasan45-*-import.json|reports/ultravasan45-*-probe.json|reports/uv45-history-validation/*)
                  ;;
                *)
                  echo "::error title=Otillåten publiceringskonflikt::Oväntad fil skulle ändras ovanpå origin/main: $changed"
                  exit 1
                  ;;
              esac
            done < <(git -C "$publish_worktree" diff --cached --name-only)

            if git -C "$publish_worktree" diff --cached --quiet; then
              echo "Historikresultaten är redan aktuella på senaste origin/main."
              git worktree remove --force "$publish_worktree"
              exit 0
            fi

            git -C "$publish_worktree" commit -m "Importera historiska Ultravasan 45-resultat"
            if git -C "$publish_worktree" push origin HEAD:main; then
              echo "Den validerade historikimporten publicerades ovanpå senaste origin/main."
              git worktree remove --force "$publish_worktree"
              exit 0
            fi

            echo "::warning title=origin/main ändrades under publiceringen::Hämtar senaste main och återapplicerar endast validerade datafiler."
            git worktree remove --force "$publish_worktree"
          done

          echo "::error title=Publiceringen avbröts säkert::origin/main fortsatte ändras eller pushen misslyckades. Det verifierade artifactet är bevarat och ingen force-push gjordes."
          exit 1

      - name: Spara diagnostik och backup före import
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uv45-history-diagnostics-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            ${{ runner.temp }}/uv45-history-artifact/before-import
            ${{ runner.temp }}/uv45-probe-*.json
            reports/ultravasan45-*-probe.json
            reports/ultravasan45-*-import.json
            reports/uv45-history-validation
