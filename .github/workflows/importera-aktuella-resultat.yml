name: Uppdatera aktuella Ultravasan-resultat

on:
  workflow_dispatch:
    inputs:
      race:
        description: "Lopp som ska hämtas"
        required: true
        default: "ultravasan45-2025"
        type: choice
        options:
          - ultravasan45-2025
          - ultravasan90-2025
      rediscover_event:
        description: "Sök eventkoden automatiskt före import"
        required: true
        default: true
        type: boolean
      force_refresh:
        description: "Hämta om redan cachade resultatsidor"
        required: true
        default: false
        type: boolean
      source_permission_confirmed:
        description: "Bekräfta att publika resultatsidor får hämtas och källan redovisas"
        required: true
        default: false
        type: boolean
      full_import_confirmed:
        description: "Bekräfta uttryckligen full import efter godkänd probe och parservalidering"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ultravasan-current-results-${{ inputs.race }}
  cancel-in-progress: false

jobs:
  importera:
    if: inputs.source_permission_confirmed == true
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Hämta projektet
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installera Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installera importpaket och webbläsare
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-browser.txt
          python -m playwright install --with-deps chromium

      - name: Säkerställ databas och loppkatalog
        run: python tools/uvtool.py init

      - name: Upptäck och konfigurera eventkod
        if: inputs.rediscover_event == true
        run: |
          python tools/mika_import.py discover --path-years 2026 2025 --browser-fallback ${{ inputs.force_refresh && '--force' || '' }}
          python tools/configure_discovered_event.py --race "${{ inputs.race }}"
          python tools/uvtool.py init

      - name: Testa importen på tio löpare
        run: |
          python tools/mika_import.py probe --race "${{ inputs.race }}" --browser-fallback ${{ inputs.force_refresh && '--force' || '' }}

      - name: Validera probe och parserkvalitet
        run: |
          python tools/uvtool.py validate
          python tools/validate_mika_probe.py --race "${{ inputs.race }}"
          echo "Probe lyckades och parservalideringen har 0 blockerande problem."

      - name: Stoppa säkert efter probe
        if: ${{ inputs.full_import_confirmed != true }}
        run: |
          echo "Full import är inte bekräftad. Körningen stannar efter godkänd probe och validering."
          echo "Starta workflowet igen med full_import_confirmed=true först när probe-rapporten har granskats."

      - name: Importera hela loppet
        if: ${{ success() && inputs.full_import_confirmed == true }}
        run: |
          echo "Probe och parservalidering är godkända; uttrycklig full-importbekräftelse finns."
          python tools/mika_import.py scrape --race "${{ inputs.race }}" --browser-fallback ${{ inputs.force_refresh && '--force' || '' }}

      - name: Validera och bygg webbdatabasen
        if: ${{ success() && inputs.full_import_confirmed == true }}
        run: |
          python tools/uvtool.py validate
          python tools/uvtool.py export
          python - <<'PY'
          import json, sqlite3, sys
          race_key = "${{ inputs.race }}"
          db = sqlite3.connect('data/ultravasan.sqlite')
          row = db.execute('SELECT id,name,year FROM races WHERE race_key=?', (race_key,)).fetchone()
          if not row:
              sys.exit(f'Loppet saknas efter import: {race_key}')
          results = db.execute('SELECT COUNT(*) FROM results WHERE race_id=?', (row[0],)).fetchone()[0]
          splits = db.execute('SELECT COUNT(*) FROM splits s JOIN results r ON r.id=s.result_id WHERE r.race_id=?', (row[0],)).fetchone()[0]
          integrity = db.execute('PRAGMA integrity_check').fetchone()[0]
          print({'race': race_key, 'results': results, 'splits': splits, 'integrity': integrity})
          if integrity != 'ok' or results < 10:
              sys.exit('Importen verkar ofullständig och publiceras därför inte.')
          PY

      - name: Spara resultat och publicera webbplatsen
        if: ${{ success() && inputs.full_import_confirmed == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            config/races.json \
            data/ultravasan.sqlite \
            docs/data/ultravasan.json \
            docs/data/ultravasan-data.js \
            docs/data/manifest.json \
            reports/discovered-ultravasan-events.json \
            reports/${{ inputs.race }}-probe.json \
            reports/${{ inputs.race }}-import.json
          if git diff --cached --quiet; then
            echo "Resultaten var redan aktuella."
          else
            git commit -m "Uppdatera ${{ inputs.race }}"
            git push
          fi

      - name: Spara importrapporter
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultatimport-${{ inputs.race }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            reports/discovered-ultravasan-events.json
            reports/${{ inputs.race }}-probe.json
            reports/${{ inputs.race }}-import.json
            docs/data/manifest.json
