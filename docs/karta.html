<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Animerad kartjämförelse av 1–5 löpare i Ultravasan 90 eller Ultravasan 45.">
  <title>Kartduell – Ultravasan</title>
  <link rel="stylesheet" href="assets/map.css?v=20260715-elevation1">
</head>
<body class="map-page">
  <div id="map" aria-label="Karta över Ultravasan"></div>
  <svg id="fallbackMap" class="fallback-map" viewBox="0 0 1200 650" preserveAspectRatio="xMidYMid meet" aria-label="Förenklad banvy"></svg>

  <header class="map-topbar glass">
    <a class="back-link" href="index.html" aria-label="Tillbaka till analysen">←</a>
    <div class="race-heading">
      <span class="mini-label">KARTDUELL</span>
      <strong id="raceTitle">Ultravasan kartduell</strong>
      <small id="courseNote">Läser banan…</small>
    </div>
    <div class="top-actions">
      <button id="mapModeBtn" class="icon-button" title="Växla mellan karta och förenklad banvy">◫ <span>Banvy</span></button>
      <button id="musicBtn" class="icon-button music-button active" title="Slå av eller på kartduellens musik">♫ <span>Musik</span></button>
      <button id="shareBtn" class="icon-button" title="Kopiera länk till denna tidpunkt">↗ <span>Dela</span></button>
      <button id="fullscreenBtn" class="icon-button" title="Helskärm">⛶</button>
    </div>
  </header>

  <aside class="leaderboard glass" id="leaderboardPanel">
    <div class="board-head">
      <div><span class="mini-label">LIVE STÄLLNING</span><strong id="raceClock">0:00:00</strong></div>
      <button id="collapseBoard" class="tiny-button" aria-label="Minimera deltagarlista">−</button>
    </div>
    <div id="runnerBoard" class="runner-board"></div>
    <div class="race-insights">
      <div><span>Ledare</span><strong id="leaderName">–</strong></div>
      <div><span>Spridning</span><strong id="fieldSpread">–</strong></div>
      <div><span>Aktuell sträcka</span><strong id="currentSection">–</strong></div>
    </div>
  </aside>

  <section class="event-feed glass" aria-live="polite">
    <span class="event-dot"></span><div id="eventText">Tryck på start för att spela upp loppet.</div>
  </section>

  <section class="duel-elevation glass" id="duelElevation" aria-label="Höjdprofil för aktuell bana">
    <div class="duel-elevation-head"><span>HÖJDPROFIL</span><strong id="duelElevationRoute">Aktuell bana</strong></div>
    <svg id="duelElevationChart" viewBox="0 0 1200 94" role="img" aria-label="Höjdprofil med löparnas synkroniserade positioner"></svg>
  </section>

  <section class="race-strip glass" id="raceStrip" aria-label="Löparnas position längs banan">
    <div class="strip-title"><span>0 km · Sälen</span><strong id="stripLeader">Start</strong><span id="stripFinishDistance">92 km · Mora</span></div>
    <div class="strip-track" id="stripTrack"></div>
  </section>

  <footer class="playback glass">
    <div class="transport">
      <button id="restartBtn" class="round-button" title="Till start">↺</button>
      <button id="backBtn" class="round-button" title="10 minuter bakåt">−10</button>
      <button id="playBtn" class="play-button" aria-label="Starta uppspelning">▶</button>
      <button id="forwardBtn" class="round-button" title="10 minuter framåt">+10</button>
    </div>
    <div class="timeline-wrap">
      <div class="time-labels"><span id="elapsedLabel">0:00:00</span><span id="finishLabel">–</span></div>
      <input id="timeline" type="range" min="0" max="1" step="1" value="0" aria-label="Tid i loppet">
    </div>
    <div class="play-options">
      <label>Hastighet<select id="speedSelect">
        <option value="30s">Hela loppet på 30 sekunder</option>
        <option value="60s" selected>Hela loppet på 1 minut</option>
        <option value="120s">Hela loppet på 2 minuter</option>
        <option value="180s">Hela loppet på 3 minuter</option>
      </select></label>
      <label>Följ<select id="cameraMode">
        <option value="overview">Hela banan</option><option value="group" selected>Löpargruppen</option><option value="leader">Ledaren</option>
      </select></label>
      <label>Hoppa<select id="checkpointJump"><option value="">Kontroll…</option></select></label>
      <label class="volume-option">Volym<input id="musicVolume" type="range" min="0" max="1" step="0.05" value="0.65" aria-label="Musikvolym"></label>
    </div>
  </footer>

  <div id="finishBurst" class="finish-burst" aria-hidden="true"></div>
  <div id="mapLoading" class="map-loading"><div></div><p>Förbereder kartduellen…</p></div>
  <audio id="raceSoundtrack" preload="metadata" loop></audio>

  <script src="data/ultravasan-routes.js?v=20260714-gpx1"></script>
  <script src="assets/speed-units.js?v=20260714-units1"></script>
  <script src="assets/race-media.js?v=20260714-replay1"></script>
  <script src="assets/map.js?v=20260715-elevation1"></script>
</body>
</html>
